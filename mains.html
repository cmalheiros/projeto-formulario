<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Baixe seu E-book Grátis</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="card-captura">
        <h2>Guia de HTML/CSS para Iniciantes</h2>
        <p>Preencha os campos abaixo para receber o link de download no seu e-mail.</p>

        <form id="meuFormulario">
            <div class="campo">
                <label for="nome">Seu Nome:</label>
                <input type="text" id="nome" placeholder="Digite seu nome completo">
            </div>

            <div class="campo">
                <label for="email">Seu E-mail:</label>
                <input type="email" id="email" placeholder="nome@exemplo.com">
            </div>

            <button type="submit" id="btn-enviar">Quero Receber Agora!</button>
        </form>
        
        <p id="mensagem-sucesso" class="escondido">Pronto! Verifique sua caixa de entrada. 📧</p>
    </div>

    <script src="script.js"></script>
</body>
</html>
